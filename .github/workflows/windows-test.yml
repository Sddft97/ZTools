name: Windows E2E Test

on:
  push:
    branches: [ main, feat/windows-* ]
  pull_request:
    branches: [ main ]

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build application
        run: pnpm build:win

      - name: Run unit tests
        run: pnpm test

      # E2E 测试需要实际 GUI 环境，此处仅作示例
      # - name: E2E Test (requires display)
      #   run: npm run test:e2e:win
